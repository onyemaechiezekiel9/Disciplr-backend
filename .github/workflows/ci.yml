name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-migrate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: disciplr
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d disciplr"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/disciplr

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Apply migrations
        run: npm run migrate:latest

      - name: Migration status
        run: npm run migrate:status

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Lockfile policy check
        run: |
          if [ -f "package-lock.json" ]; then
            npm ci --dry-run
          else
            echo "Error: package-lock.json missing"
            exit 1
          fi

      - name: Dependency vulnerability scan
        run: npm audit --audit-level=high
        continue-on-error: true # Report-only initially as requested

      - name: Generate security report
        run: |
          mkdir -p reports
          npm audit --json > reports/npm-audit.json
        continue-on-error: true
      - name: Generate OpenAPI spec
        run: npm run openapi:generate

      - name: Validate OpenAPI spec
        run: npm run openapi:validate
